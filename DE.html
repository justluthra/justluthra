<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain + URL + IP Extractor</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #333;
}
.container { max-width: 1000px; margin: auto; padding: 20px; }
.card { background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
textarea { width: 100%; height: 150px; padding: 10px; }
button { padding: 10px 15px; margin: 5px; cursor: pointer; }
.result-textarea { width: 100%; height: 120px; margin-top: 10px; }
</style>
</head>

<body>
<div class="container">

<h1>🔍 Domain + URL + IP Extractor</h1>

<div class="card">
<textarea id="inputText" placeholder="Paste text here..."></textarea>
<br>
<button onclick="extractAll()">Extract</button>
<button onclick="clearInput()">Clear</button>
</div>

<div class="card" id="results"></div>

</div>

<script>

// ================= DOMAIN =================
function extractDomains(text) {
    const pattern = /(?:(?:https?|ftp):\/\/)?(?:www\.)?([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}/gi;
    let matches = text.match(pattern) || [];

    return [...new Set(matches.map(d => 
        d.replace(/https?:\/\//, '').replace(/^www\./, '')
    ))].sort();
}

// ================= URL =================
function extractUrls(text) {
    const pattern = /(https?:\/\/[^\s]+)/gi;
    let matches = text.match(pattern) || [];

    return [...new Set(matches)].sort();
}

// ================= IP =================
function extractIPs(text) {
    if (!text) return [];

    // Improved IPv4 regex (handles messy text)
    const ipPattern = /\b(?:\d{1,3}\.){3}\d{1,3}\b/g;

    let matches = text.match(ipPattern) || [];

    // Strict validation (important)
    matches = matches.filter(ip => {
        const parts = ip.split('.');
        return parts.length === 4 &&
               parts.every(p => Number(p) >= 0 && Number(p) <= 255);
    });

    return [...new Set(matches)].sort();
}

// ================= MAIN =================
function extractAll() {
    const text = document.getElementById("inputText").value;

    if (!text.trim()) {
        alert("Enter text first");
        return;
    }

    const domains = extractDomains(text);
    const urls = extractUrls(text);
    const ips = extractIPs(text);

    let html = "";

    // Stats
    html += `<h3>📊 Stats</h3>
    Domains: ${domains.length} | URLs: ${urls.length} | IPs: ${ips.length}<hr>`;

    // Domains
    if (domains.length) {
        html += `<h3>🌐 Domains (${domains.length})</h3>
        <textarea class="result-textarea">${domains.join("\n")}</textarea>`;
    }

    // URLs
    if (urls.length) {
        html += `<h3>🔗 URLs (${urls.length})</h3>
        <textarea class="result-textarea">${urls.join("\n")}</textarea>`;
    }

    // IPs
    if (ips.length) {
        html += `<h3>🧠 IP Addresses (${ips.length})</h3>
        <textarea class="result-textarea">${ips.join("\n")}</textarea>`;
    }

    if (!domains.length && !urls.length && !ips.length) {
        html = "<p>No results found</p>";
    }

    document.getElementById("results").innerHTML = html;
}

// ================= CLEAR =================
function clearInput() {
    document.getElementById("inputText").value = "";
    document.getElementById("results").innerHTML = "";
}

</script>

</body>
</html>
