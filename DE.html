
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain + URL + IP + CIDR & WILDCARD Extractor Design by @Cryptographer</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #333;
}
.container { max-width: 1000px; margin: auto; padding: 20px; }
.card { background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
textarea { width: 100%; height: 150px; padding: 10px; }
button { padding: 10px 15px; margin: 5px; cursor: pointer; }
.result-textarea { width: 100%; height: 120px; margin-top: 10px; }
</style>
</head>

<body>
<div class="container">

<h1>🔍 Domain + URL + IP + CIDR & WILDCARD Extractor Design by @Cryptographer </h1>

<div class="card">
<textarea id="inputText" placeholder="Paste text here..."></textarea>
<br>
<button onclick="extractAll()">Extract</button>
<button onclick="clearInput()">Clear</button>
</div>

<div class="card" id="results"></div>

</div>

<script>

// ================= DOMAIN =================
function extractDomains(text) {
    const pattern = /\b(?:[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}\b/gi;

    let matches = text.match(pattern) || [];

    matches = matches.filter(d => !d.startsWith('*.'));

    return [...new Set(matches.map(d =>
        d.replace(/^www\./i, '')
    ))].sort();
}

// ================= URL =================
function extractUrls(text) {
    const pattern = /(https?:\/\/[^\s<>"']+)/gi;

    let matches = text.match(pattern) || [];

    matches = matches.map(url =>
        url.replace(/[),.;]+$/, '')
    );

    return [...new Set(matches)].sort();
}

// ================= IPv4 =================
function extractIPs(text) {
    const ipPattern = /\b(?:\d{1,3}\.){3}\d{1,3}\b/g;

    let matches = text.match(ipPattern) || [];

    matches = matches.filter(ip => {
        const parts = ip.split('.');

        return (
            parts.length === 4 &&
            parts.every(p =>
                Number(p) >= 0 &&
                Number(p) <= 255
            )
        );
    });

    return [...new Set(matches)].sort();
}

// ================= CIDR =================
function extractCIDRs(text) {
    const pattern =
        /\b(?:\d{1,3}\.){3}\d{1,3}\/(?:[0-9]|[1-2][0-9]|3[0-2])\b/g;

    let matches = text.match(pattern) || [];

    matches = matches.filter(cidr => {
        const [ip, mask] = cidr.split('/');

        const parts = ip.split('.');

        return (
            Number(mask) >= 0 &&
            Number(mask) <= 32 &&
            parts.length === 4 &&
            parts.every(p =>
                Number(p) >= 0 &&
                Number(p) <= 255
            )
        );
    });

    return [...new Set(matches)].sort();
}

// ================= WILDCARD DOMAINS =================
function extractWildcardDomains(text) {
    const pattern =
        /\*\.(?:[a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}\b/gi;

    let matches = text.match(pattern) || [];

    return [...new Set(matches)].sort();
}

// ================= MAIN =================
function extractAll() {

    const text = document.getElementById("inputText").value;

    if (!text.trim()) {
        alert("Enter text first");
        return;
    }

    const domains = extractDomains(text);
    const urls = extractUrls(text);
    const ips = extractIPs(text);
    const cidrs = extractCIDRs(text);
    const wildcards = extractWildcardDomains(text);

    let html = "";

    // ================= STATS =================

    html += `
    <h3>📊 Stats</h3>
    Domains: ${domains.length} |
    URLs: ${urls.length} |
    IPs: ${ips.length} |
    CIDRs: ${cidrs.length} |
    Wildcards: ${wildcards.length}
    <hr>
    `;

    // ================= DOMAINS =================

    if (domains.length) {
        html += `
        <h3>🌐 Domains (${domains.length})</h3>
        <textarea class="result-textarea">${domains.join("\n")}</textarea>
        `;
    }

    // ================= URLS =================

    if (urls.length) {
        html += `
        <h3>🔗 URLs (${urls.length})</h3>
        <textarea class="result-textarea">${urls.join("\n")}</textarea>
        `;
    }

    // ================= IPS =================

    if (ips.length) {
        html += `
        <h3>🧠 IP Addresses (${ips.length})</h3>
        <textarea class="result-textarea">${ips.join("\n")}</textarea>
        `;
    }

    // ================= CIDR =================

    if (cidrs.length) {
        html += `
        <h3>📡 CIDR Ranges (${cidrs.length})</h3>
        <textarea class="result-textarea">${cidrs.join("\n")}</textarea>
        `;
    }

    // ================= WILDCARDS =================

    if (wildcards.length) {
        html += `
        <h3>🌟 Wildcard Domains (${wildcards.length})</h3>
        <textarea class="result-textarea">${wildcards.join("\n")}</textarea>
        `;
    }

    // ================= EMPTY =================

    if (
        !domains.length &&
        !urls.length &&
        !ips.length &&
        !cidrs.length &&
        !wildcards.length
    ) {
        html = "<p>No results found</p>";
    }

    document.getElementById("results").innerHTML = html;
}

// ================= CLEAR =================

function clearInput() {
    document.getElementById("inputText").value = "";
    document.getElementById("results").innerHTML = "";
}

</script>

</body>
</html>
