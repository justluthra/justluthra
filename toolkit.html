<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Toolkit</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Segoe UI,Arial,sans-serif;
    height:100vh;
    overflow:hidden;
}

.header{
    background:#111827;
    padding:12px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    color:#00e5ff;
    border-bottom:2px solid #00e5ff;
}

.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:10px;
    justify-content:center;
    background:#1e293b;
}

button{
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    background:#00e5ff;
    color:black;
}

button:hover{
    transform:translateY(-2px);
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
    height:calc(100vh - 140px);
}

.panel{
    background:#1e293b;
    border-radius:15px;
    padding:15px;
    box-shadow:0 0 20px rgba(0,229,255,.2);
    display:flex;
    flex-direction:column;
}

h3{
    margin-bottom:10px;
    color:#00ff88;
}

textarea{
    flex:1;
    width:100%;
    resize:none;
    background:#0f172a;
    color:#00ff88;
    border:1px solid #334155;
    border-radius:10px;
    padding:12px;
    font-family:Consolas,monospace;
}

#jwt{
    margin-top:10px;
    background:#111827;
    padding:10px;
    border-radius:10px;
    overflow:auto;
    max-height:250px;
    font-size:13px;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.close{
    margin-top:15px;
    background:#ff4d6d;
    color:white;
}
</style>
</head>
<body>

<div class="header">
⚡ Cryptographer Toolkit ⚡
</div>

<div class="toolbar">
<button onclick="hexEncode()">HEX Encode</button>
<button onclick="hexDecode()">HEX Decode</button>

<button onclick="base64Encode()">Base64 Encode</button>
<button onclick="base64Decode()">Base64 Decode</button>

<button onclick="urlEncode()">URL Encode</button>
<button onclick="urlDecode()">URL Decode</button>

<button onclick="jwtDecode()">JWT Decode</button>

<button onclick="sha256Hash()">SHA256</button>

<button onclick="jsonBeautify()">JSON Format</button>

<button onclick="showQR()">QR Code</button>

<button onclick="copyOutput()">Copy Output</button>

<button onclick="clearAll()">Clear</button>
</div>

<div class="container">

<div class="panel">
<h3>Input</h3>
<textarea id="input"></textarea>
</div>

<div class="panel">
<h3>Output</h3>
<textarea id="output"></textarea>

<div id="jwt"></div>
</div>

</div>

<div class="modal" id="qrModal">
<div class="modal-content">
<h2>QR Code</h2>
<div id="qrcode"></div>
<button class="close" onclick="closeQR()">Close</button>
</div>
</div>

<script>

function getInput(){
    return document.getElementById("input").value;
}

function setOutput(v){
    document.getElementById("output").value=v;
}

function clearJWT(){
    document.getElementById("jwt").innerHTML="";
}

function clearAll(){
    document.getElementById("input").value="";
    document.getElementById("output").value="";
    clearJWT();
}

function hexEncode(){
    clearJWT();
    let text=getInput();
    let hex='';
    for(let i=0;i<text.length;i++){
        hex+=text.charCodeAt(i).toString(16).padStart(2,'0');
    }
    setOutput(hex);
}

function hexDecode(){
    clearJWT();
    let hex=getInput().replace(/\s/g,'');
    let out='';
    for(let i=0;i<hex.length;i+=2){
        out+=String.fromCharCode(parseInt(hex.substr(i,2),16));
    }
    setOutput(out);
}

function base64Encode(){
    clearJWT();
    setOutput(btoa(unescape(encodeURIComponent(getInput()))));
}

function base64Decode(){
    clearJWT();
    try{
        setOutput(decodeURIComponent(escape(atob(getInput()))));
    }catch{
        alert("Invalid Base64");
    }
}

function urlEncode(){
    clearJWT();
    setOutput(encodeURIComponent(getInput()));
}

function urlDecode(){
    clearJWT();
    try{
        setOutput(decodeURIComponent(getInput()));
    }catch{
        alert("Invalid URL");
    }
}

function jsonBeautify(){
    clearJWT();
    try{
        setOutput(JSON.stringify(JSON.parse(getInput()),null,4));
    }catch{
        alert("Invalid JSON");
    }
}

async function sha256Hash(){

    clearJWT();

    const data=new TextEncoder().encode(getInput());

    const hash=await crypto.subtle.digest(
        "SHA-256",
        data
    );

    const hex=[...new Uint8Array(hash)]
        .map(x=>x.toString(16).padStart(2,'0'))
        .join('');

    setOutput(hex);
}

function base64url(str){

    return btoa(unescape(encodeURIComponent(str)))
        .replace(/\+/g,'-')
        .replace(/\//g,'_')
        .replace(/=+$/,'');

}

function jwtEncode(){

    try{

        let header = JSON.parse(
            document.getElementById("jwtHeader").value
        );

        let payload = JSON.parse(
            document.getElementById("jwtPayload").value
        );

        let encodedHeader = base64url(
            JSON.stringify(header)
        );

        let encodedPayload = base64url(
            JSON.stringify(payload)
        );

        // Reuse old signature (will NOT be valid if modified)
        let token =
            encodedHeader +
            "." +
            encodedPayload +
            "." +
            originalSignature;

        setOutput(token);

    }catch{

        alert("Invalid JSON");

    }

}

function copyOutput(){
    navigator.clipboard.writeText(
        document.getElementById("output").value
    );
}

function showQR(){

    let text=getInput();

    document.getElementById("qrcode").innerHTML='';

    new QRCode(
        document.getElementById("qrcode"),
        {
            text:text,
            width:300,
            height:300
        }
    );

    document.getElementById("qrModal").style.display="flex";
}

function closeQR(){
    document.getElementById("qrModal").style.display="none";
}

</script>

</body>
</html>
